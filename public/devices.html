<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Devices — School IT Tickets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="wrap">
      <nav class="main-nav" aria-label="Main sections">
        <a href="/">Tickets</a>
        <a href="/devices" aria-current="page">Devices</a>
        <a href="/reports">Reports</a>
      </nav>

      <header class="app-header">
        <div class="brand">
          <strong>Devices &amp; brands</strong>
          <span>Manage hardware inventory for hardware tickets</span>
        </div>
        <div class="header-actions">
          <button type="button" class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
        </div>
      </header>

      <section class="card" style="margin-bottom: 1.5rem">
        <h2 style="margin-top: 0">Brands</h2>
        <form id="brandForm" class="form-row-2" style="align-items: end; margin-bottom: 1rem">
          <label>
            New brand name
            <input type="text" id="brandNameInput" placeholder="e.g. HP, Dell, Canon" />
          </label>
          <button type="submit" class="btn btn-primary">Add brand</button>
        </form>
        <div class="table-wrap">
          <table class="tickets">
            <thead>
              <tr>
                <th>Name</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="brandRows"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <h2 style="margin-top: 0">Devices</h2>
        <p style="margin: 0 0 1rem; font-size: 0.9rem; color: var(--muted)">
          Type: printer, computer, peripheral, or other. Each device is linked to a brand.
        </p>
        <form id="deviceForm" class="form-grid" style="margin-bottom: 1rem">
          <div class="form-row-2">
            <label>
              Type *
              <select id="devType" required>
                <option value="printer">Printer</option>
                <option value="computer">Computer</option>
                <option value="peripheral">Peripheral</option>
                <option value="other">Other</option>
              </select>
            </label>
            <label>
              Brand *
              <select id="devBrandId" required></select>
            </label>
          </div>
          <label>
            Label / note (optional)
            <input type="text" id="devLabel" placeholder="e.g. Lab 3, Main office MFP" />
          </label>
          <button type="submit" class="btn btn-primary" id="deviceSubmitBtn">Add device</button>
          <button type="button" class="btn" id="deviceCancelEdit" hidden>Cancel edit</button>
        </form>
        <div class="table-wrap">
          <table class="tickets">
            <thead>
              <tr>
                <th>Type</th>
                <th>Brand</th>
                <th>Label</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="deviceRows"></tbody>
          </table>
        </div>
      </section>
    </div>
    <script src="/js/devices.js"></script>
  </body>
</html>
